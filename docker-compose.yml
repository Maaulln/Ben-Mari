services:
  oracle-db:
    image: gvenzl/oracle-free:slim
    container_name: oracle-db
    restart: unless-stopped
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "050621"
      APP_USER: "C##KLINIK_ADMIN"
      APP_USER_PASSWORD: "klinik123"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./backend/database/Klinik BenMari.sql:/container-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - klinik-net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klinik-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: KlinikBenMari
      APP_ENV: local
      APP_KEY: "base64:SVAgDY0nOl913PuuNojwK3T/OnwG0map7OlbiwA3poE="
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8000"
      DB_CONNECTION: oracle
      DB_HOST: oracle-db
      DB_PORT: 1521
      DB_DATABASE: FREE
      DB_USERNAME: "C##KLINIK_ADMIN"
      DB_PASSWORD: klinik123
      DB_CHARSET: AL32UTF8
      LOG_CHANNEL: stack
      CACHE_DRIVER: file
      SESSION_DRIVER: file
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - klinik-net

networks:
  klinik-net:
    driver: bridge

volumes:
  oracle_data:
